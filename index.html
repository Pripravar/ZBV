<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ZBV — přehled změn během výstavby</title>
<style>
  :root{--bg:#ffffff;--card:#ffffff;--line:#e3e6eb;--txt:#1a1d21;--muted:#6b7280;
    --accent:#2563eb;--head:#f3f4f6;--title:#f7f8fa;--edit:#f5f6f8;
    --pos:#15803d;--neg:#dc2626;
    --hotovo:#16a34a;--vproces:#d97706;--bezprogresu:#dc2626;--evidovano:#64748b;--fakturovano:#2563eb;}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt);-webkit-text-size-adjust:100%}
  header{position:sticky;top:0;z-index:5;background:var(--card);border-bottom:1px solid var(--line);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  header h1{font-size:16px;margin:0;font-weight:700;line-height:1.2}
  header .sub{font-size:11px;color:var(--muted)} header .spacer{flex:1}
  .btn{background:var(--edit);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer}
  .btn:hover{background:#eceef1}
  .btn:active{transform:translateY(1px)}
  .btn-add{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700}
  .ctrl{background:var(--edit);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:8px 12px;font-size:14px}
  #search{flex:1;min-width:150px;max-width:280px}
  .wrap{padding:12px 14px 80px;max-width:100%;margin:0 auto}
  .toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:6px 0 14px}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{background:var(--edit);color:var(--muted);border:0;padding:8px 12px;font-size:13px;cursor:pointer}
  .seg button.on{background:var(--accent);color:#fff;font-weight:700}
  .stavbatabs{display:flex;gap:6px;overflow-x:auto;padding:2px 0 12px;margin-bottom:2px;scrollbar-width:thin}
  .stavbatabs button{flex:0 0 auto;background:var(--edit);color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:7px 13px;font-size:13px;cursor:pointer;white-space:nowrap}
  .stavbatabs button.on{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700}
  .stavbatabs button .c{opacity:.65;font-size:11px;margin-left:5px}
  /* layout 2 sloupce: levý panel + obsah */
  .cols{display:flex;gap:12px;align-items:flex-start}
  #stavby-side{flex:0 0 236px;display:flex;flex-direction:column;gap:5px;max-height:calc(100vh - 150px);overflow:auto;position:sticky;top:92px}
  .sb-sort{width:100%;padding:5px 7px;border:1px solid var(--line);border-radius:7px;background:var(--card);color:var(--txt);font-size:12px;margin-bottom:2px}
  #list{flex:1;min-width:0}
  .sb-search{width:100%;background:var(--edit);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:7px 10px;font-size:13px;margin-bottom:3px}
  .sb-item{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 10px;cursor:pointer}
  .sb-item.on{border-color:var(--accent);box-shadow:inset 3px 0 0 var(--accent)}
  .sb-item .nm{font-size:13px;font-weight:700;display:flex;align-items:baseline;gap:6px;line-height:1.25}
  .sb-item .nm .cnt{margin-left:auto;font-size:11px;color:var(--muted);font-weight:400}
  .sb-item .sub{font-size:10.5px;color:var(--muted);margin:2px 0 7px}
  .sb-bar{display:flex;height:7px;border-radius:4px;overflow:hidden;background:#eceef1}
  .sb-bar i{display:block;height:100%}
  .seg-bezprogresu{background:var(--bezprogresu)} .seg-vproces{background:var(--vproces)} .seg-hotovo{background:var(--hotovo)} .seg-fakturovano{background:var(--fakturovano)} .seg-evidovano{background:var(--evidovano)}
  .sb-item.arch{opacity:.55} .sb-item.arch.on{opacity:1}
  .sb-arch-btn{font-size:11.5px;color:var(--muted);text-align:center;padding:8px;cursor:pointer;border:1px dashed var(--line);border-radius:8px;margin-top:4px;flex:0 0 auto}
  .sb-arch-btn:hover{background:var(--edit)}
  /* kombinovatelné filtry stavů */
  .fchips{display:inline-flex;gap:6px;flex-wrap:wrap}
  .fchip{font-size:12.5px;padding:6px 11px;border-radius:999px;border:1px solid var(--line);background:var(--edit);color:var(--muted);cursor:pointer}
  .fchip.on{font-weight:700;color:#fff}
  .fchip.on.f-vproces{background:var(--vproces);border-color:var(--vproces)}
  .fchip.on.f-hotovo{background:var(--hotovo);border-color:var(--hotovo)}
  .fchip.on.f-fakturovano{background:var(--fakturovano);border-color:var(--fakturovano)}
  .fchip.on.f-bezprogresu{background:var(--bezprogresu);border-color:var(--bezprogresu)}
  .fchip.on.f-evidovano{background:var(--evidovano);border-color:var(--evidovano)}
  /* hlavička stavby */
  .shead{background:var(--title);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:12px}
  .shead .nazev{font-size:18px;font-weight:800;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .shead .cislo{font-size:11px;background:var(--edit);padding:2px 8px;border-radius:999px;color:var(--muted);font-weight:400}
  .shead .lide{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.7}
  .shead .lide b{color:var(--txt);font-weight:600}
  .smetrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-top:10px}
  .smetric{background:var(--edit);border-radius:8px;padding:8px 10px}
  .smetric .l{font-size:11px;color:var(--muted)} .smetric .v{font-size:15px;font-weight:700;margin-top:2px}
  .smetric .ok{font-size:11px;color:var(--pos);font-weight:400} .smetric .warn{font-size:11px;color:var(--neg);font-weight:400}
  .smetric .sub-h{font-size:12px;font-weight:400;color:var(--muted)}
  .smetric.st-vproces{box-shadow:inset 4px 0 0 var(--vproces)} .smetric.st-hotovo{box-shadow:inset 4px 0 0 var(--hotovo)}
  .smetric.st-fakturovano{box-shadow:inset 4px 0 0 var(--fakturovano)} .smetric.st-bezprogresu{box-shadow:inset 4px 0 0 var(--bezprogresu)} .smetric.st-evidovano{box-shadow:inset 4px 0 0 var(--evidovano)}
  /* ZBV karty */
  .zcard{background:var(--card);border:1px solid var(--line);border-radius:11px;margin-bottom:8px;overflow:hidden}
  .zhead{display:flex;align-items:center;gap:9px;padding:10px 12px;cursor:pointer;flex-wrap:wrap}
  .zbadge{font-size:12px;font-weight:700;padding:2px 9px;border-radius:999px;color:#fff;white-space:nowrap}
  .znazev{font-size:13.5px;font-weight:700} .zmeta{font-size:11px;color:var(--muted)}
  .zchev{margin-left:auto;color:var(--muted);font-size:12px;transition:transform .15s}
  .zcard.open .zchev{transform:rotate(90deg)}
  .pin{background:none;border:1px solid transparent;cursor:pointer;font-size:17px;line-height:1;color:#9aa3af;padding:2px 5px;border-radius:7px}
  .pin:hover{background:#fef3c7;border-color:#fbcf6b;color:#d97706} .pin.on{color:#d97706}
  .zcard.dul{box-shadow:inset 3px 0 0 #d97706}
  #f-dul.on{background:#fef3c7;border-color:#f59e0b;color:#92400e;font-weight:700}
  .zstad{display:flex;align-items:center;gap:9px;padding:0 12px 10px;flex-wrap:wrap}
  .stadchip{font-size:12px;padding:3px 10px;border-radius:8px;display:inline-flex;align-items:center;gap:5px;font-weight:600}
  .st-vproces .stadchip{background:#fef3c7;color:#92400e} .st-hotovo .stadchip{background:#dcfce7;color:#166534}
  .st-fakturovano .stadchip{background:#dbeafe;color:#1e40af} .st-bezprogresu .stadchip{background:#fee2e2;color:#991b1b} .st-evidovano .stadchip{background:#eef1f4;color:#475569}
  .vazne-badge{font-size:11px;font-weight:700;background:#fee2e2;color:#991b1b;padding:2px 9px;border-radius:999px}
  .zwait{font-size:11.5px;color:var(--muted)} .zamt{margin-left:auto;font-size:12.5px;white-space:nowrap;font-variant-numeric:tabular-nums}
  .zamt .p{color:var(--pos)} .zamt .n{color:var(--neg)}
  /* časová osa (historie) */
  .zdetail{border-top:1px solid var(--line);padding:11px 13px;background:var(--edit)}
  .tl-phase{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:8px 0 3px}
  .tl{position:relative;padding-left:13px;border-left:2px solid var(--line)}
  .tl-item{position:relative;padding:3px 0 7px 8px}
  .tl-item:before{content:'';position:absolute;left:-7px;top:6px;width:9px;height:9px;border-radius:50%;background:var(--accent)}
  .tl-item.last:before{box-shadow:0 0 0 3px rgba(59,130,246,.35)}
  .tl-lab{font-size:10.5px;color:var(--muted)} .tl-val{font-size:13px;white-space:pre-line}
  .tl-empty{font-size:12px;color:var(--muted);padding:4px 0}
  .zdrow{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:7px;font-size:12.5px;margin:8px 0}
  .zdrow .k{color:var(--muted);font-size:10.5px;display:block}
  .zacts{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
  /* obecná poznámka u ZBV */
  .zpozn-wrap{margin:10px 0 4px}
  .zpozn-wrap .k{color:var(--muted);font-size:10.5px;display:block;margin-bottom:3px}
  .zpozn-ts{color:var(--accent);font-weight:600}
  .zpozn{width:100%;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:8px 10px;font:inherit;font-size:13px;color:var(--txt);min-height:38px;resize:vertical;line-height:1.45}
  .zpozn:focus{outline:none;border-color:var(--accent)}
  /* zápis z porad */
  .por-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .por-h{font-size:17px;font-weight:800;display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .por-sub{font-size:12px;font-weight:400;color:var(--muted)}
  .por-tools{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
  .por-empty{color:var(--muted);font-size:13.5px;line-height:1.6;background:var(--edit);border:1px dashed var(--line);border-radius:12px;padding:18px}
  .porada{border:1px solid var(--line);border-radius:12px;padding:10px 12px 12px;margin-bottom:12px;background:var(--card)}
  .porada.pnew{border-color:var(--accent);box-shadow:inset 4px 0 0 var(--accent);background:#f5f9ff}
  .porada.pold{opacity:.92}
  .por-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .por-dot{width:9px;height:9px;border-radius:50%;background:var(--muted);flex:0 0 auto}
  .pnew .por-dot{background:var(--accent)}
  .por-datum{font-weight:800;font-size:14px;border:1px solid transparent;border-radius:6px;padding:2px 6px;background:transparent;color:var(--txt);width:104px}
  .pold .por-datum{color:#111}
  .por-datum:hover,.por-datum:focus{border-color:var(--line);outline:none;background:var(--card)}
  .por-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#fff;background:var(--accent);padding:2px 7px;border-radius:999px}
  .por-spc{flex:1}
  .por-x{background:none;border:1px solid transparent;color:var(--muted);font-size:11.5px;cursor:pointer;border-radius:6px;padding:2px 7px}
  .por-x:hover{color:var(--neg);border-color:var(--line)}
  .por-carry{background:var(--edit);border:1px solid var(--line);color:var(--accent);font-size:11.5px;font-weight:600;cursor:pointer;border-radius:7px;padding:3px 9px}
  .por-carry:hover{background:#e7eefc}
  .psek{margin:2px 0 4px;padding:4px 0 6px;border-top:1px dashed var(--line)}
  .psek:first-of-type{border-top:none}
  .psek-head{display:flex;align-items:center;gap:6px;margin:4px 0 2px}
  .psek-akce{flex:1;font-weight:800;font-size:13.5px;border:1px solid transparent;border-radius:6px;padding:3px 6px;background:transparent;color:var(--txt)}
  .pold .psek-akce{color:#111}
  .psek-akce:hover,.psek-akce:focus{border-color:var(--line);outline:none;background:var(--card)}
  .psek-akce::placeholder{color:var(--muted);font-weight:600}
  .psek-x{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;padding:2px 6px;border-radius:6px;visibility:hidden}
  .psek:hover .psek-x{visibility:visible} .psek-x:hover{color:var(--neg)}
  .psek-add{margin-top:6px;background:none;border:1px dashed var(--line);color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;border-radius:7px;padding:5px 11px}
  .psek-add:hover{background:var(--edit)}
  .pbod{display:flex;align-items:flex-start;gap:8px;padding:3px 0}
  .pchk{flex:0 0 auto;width:20px;height:20px;border:1.5px solid var(--line);border-radius:6px;background:var(--card);cursor:pointer;font-size:12px;color:#fff;line-height:1;margin-top:2px}
  .pbod.done .pchk{background:var(--hotovo);border-color:var(--hotovo)}
  .ptxt{flex:1;font-size:13.5px;line-height:1.5;padding:2px 4px;border-radius:6px;min-height:22px;color:var(--txt);white-space:pre-wrap}
  .pold .ptxt{color:#111}
  .ptxt:focus{outline:none;background:var(--edit);box-shadow:inset 0 0 0 1px var(--line)}
  .ptxt:empty:before{content:attr(placeholder);color:var(--muted)}
  .pbod.done .ptxt{text-decoration:line-through;color:var(--muted)}
  .pbx{flex:0 0 auto;background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:2px 5px;border-radius:6px;visibility:hidden}
  .pbod:hover .pbx{visibility:visible}
  .pbx:hover{color:var(--neg)}
  .por-none{font-size:12px;color:var(--muted);padding:3px 0 3px 28px}
  .pbod-add{margin:6px 0 0 28px;background:none;border:1px dashed var(--line);color:var(--muted);font-size:12px;cursor:pointer;border-radius:7px;padding:4px 10px}
  .pbod-add:hover{background:var(--edit);color:var(--txt)}
  /* legenda barev */
  .legenda{display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:var(--muted);margin:0 0 12px;align-items:center}
  .legenda .lg{display:inline-block;width:10px;height:10px;border-radius:3px;vertical-align:-1px;margin-right:4px}
  /* ředitelský přehled */
  #prehled{padding-top:2px}
  .ph-head{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:8px 0 10px}
  .ph-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:22px}
  .ph-card{border:1px solid var(--line);border-radius:11px;padding:12px 14px;background:var(--card)}
  .ph-card.st-vproces{box-shadow:inset 4px 0 0 var(--vproces)} .ph-card.st-hotovo{box-shadow:inset 4px 0 0 var(--hotovo)}
  .ph-card.st-fakturovano{box-shadow:inset 4px 0 0 var(--fakturovano)} .ph-card.st-bezprogresu{box-shadow:inset 4px 0 0 var(--bezprogresu)} .ph-card.ph-tot{box-shadow:inset 4px 0 0 var(--accent)}
  .ph-card.st-evidovano{box-shadow:inset 4px 0 0 var(--evidovano)}
  .ph-card.ph-arch{box-shadow:inset 4px 0 0 var(--muted);background:var(--edit)}
  .ph-sep td{background:var(--edit);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
  .phc-l{font-size:12px;color:var(--muted)} .phc-n{font-size:21px;font-weight:800;margin-top:5px} .phc-h{font-size:13px;margin-top:2px;font-variant-numeric:tabular-nums}
  .ph-tbl-wrap{overflow-x:auto}
  .ph-tbl{width:100%;border-collapse:collapse;font-size:13px;min-width:640px}
  .ph-tbl th,.ph-tbl td{padding:7px 10px;border-bottom:1px solid var(--line);text-align:left}
  .ph-tbl thead th{font-size:11px;color:var(--muted);background:var(--head)}
  .ph-tbl td.c{text-align:center} .ph-tbl td.cena{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  .ph-row{cursor:pointer} .ph-row:hover td{background:#f1f3f5}
  .ph-tbl .vp{color:#b45309} .ph-tbl .ho{color:#15803d} .ph-tbl .fa{color:#1d4ed8} .ph-tbl .bp{color:#dc2626;font-weight:700}
  @media(max-width:760px){
    .cols{flex-direction:column}
    #stavby-side{flex:none;width:100%;position:static;max-height:none;flex-direction:row;overflow-x:auto;padding-bottom:4px}
    #stavby-side .sb-search{display:none}
    #stavby-side .sb-sort{flex:0 0 150px;width:150px;margin-bottom:0;align-self:center}
    .sb-item{flex:0 0 180px}
  }
  .badge{display:inline-block;padding:2px 7px;border-radius:999px;font-size:10px;font-weight:700;color:#fff;white-space:nowrap}
  .b-hotovo{background:var(--hotovo)}.b-vproces{background:var(--vproces)}.b-bezprogresu{background:var(--bezprogresu)}.b-fakturovano{background:var(--fakturovano)}.b-evidovano{background:var(--evidovano)}
  .stavba{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:16px;overflow:hidden}
  .stavba .title{padding:12px 14px;border-bottom:1px solid var(--line);background:var(--title);display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap}
  .stavba .title .nazev{font-size:18px;font-weight:800;letter-spacing:.3px}
  .stavba .title .info{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5}
  .stavba .title .spc{flex:1}
  .sum{font-size:12px;color:var(--muted);display:flex;gap:14px;flex-wrap:wrap;margin-top:4px}
  .sum b{color:var(--txt)} .sum .p{color:var(--pos)} .sum .n{color:var(--neg)}
  .tbl-scroll{overflow-x:auto}
  table{border-collapse:collapse;font-size:12.5px;width:max-content;min-width:100%}
  th,td{padding:6px 9px;border-bottom:1px solid var(--line);border-right:1px solid var(--line);vertical-align:top;text-align:left}
  th:last-child,td:last-child{border-right:none}
  thead th{font-size:10.5px;color:var(--muted);background:var(--head);text-align:center;font-weight:700;position:sticky;top:0}
  thead tr.grp th{text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--line)}
  .g-ident{color:#cdd9e6}.g-ozn{color:#9fd0c6}.g-penize{color:#e6cf9f}.g-proces{color:#b9c4f0}.g-fakt{color:#e0b3d8}
  td.krok{white-space:pre-line;min-width:130px;max-width:230px;font-size:12px;line-height:1.35}
  td.cena{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  td.first{position:sticky;left:0;background:var(--card);z-index:1;min-width:230px;max-width:320px;box-shadow:2px 0 0 var(--line)}
  tr:hover td.first{background:#f1f3f5}
  td.first .nm{font-weight:700} td.first .ds{color:var(--muted);font-size:11.5px;margin-top:2px}
  tr.st-hotovo td.first{box-shadow:inset 3px 0 0 var(--hotovo),2px 0 0 var(--line)}
  tr.st-vproces td.first{box-shadow:inset 3px 0 0 var(--vproces),2px 0 0 var(--line)}
  tr.st-bezprogresu td.first{box-shadow:inset 3px 0 0 var(--bezprogresu),2px 0 0 var(--line)}
  tr.st-fakturovano td.first{box-shadow:inset 3px 0 0 var(--fakturovano),2px 0 0 var(--line)}
  .rowbtn{background:transparent;border:1px solid var(--line);border-radius:6px;color:var(--txt);cursor:pointer;font-size:12px;padding:1px 6px;margin-right:3px}
  .rowbtn.del{color:var(--neg);border-color:transparent}
  .rowbtn.star{border-color:transparent;color:var(--muted)} .rowbtn.star.on{color:#f5c518}
  .empty{color:var(--muted);font-size:13px;padding:14px}
  /* inbox */
  .ibx{display:grid;gap:12px;max-width:760px}
  .icard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px}
  .icard.low{border-color:#f59e0b}
  .icard .ih{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
  .icard .subj{font-weight:700;font-size:14px}
  .icard .meta{font-size:11.5px;color:var(--muted);margin-bottom:8px}
  .navrh{background:var(--edit);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13px;line-height:1.7}
  .navrh .k{color:var(--muted);display:inline-block;min-width:70px}
  .navrh b{color:var(--txt)}
  .jist{font-size:10px;padding:2px 7px;border-radius:999px;font-weight:700}

<script>

  {id:"podpisAD",    g:"proces",l:"podpis AD",krok:1},
  {id:"podpisTDI",   g:"proces",l:"podpis TDI/TDS",krok:1},
  {id:"schvalenoCM", g:"proces",l:"schváleno CM",krok:1},
  // group: fakturace
  {id:"predlozenoReditelstvi",g:"fakt",l:"předloženo na ředitelství",krok:1},
  {id:"predlozenoRSDTDS",g:"fakt",l:"předloženo na ŘSD/TDS",krok:1},
  {id:"podpisObjednatele",g:"fakt",l:"podpis objednatele",krok:1},
  {id:"zadanoIPOS",  g:"fakt",l:"zadáno do IPOS",krok:1},
  {id:"iposEdok",    g:"fakt",l:"IPOS / EDOK",krok:1},
  {id:"vracenoRSD",  g:"fakt",l:"vráceno od ŘSD",krok:1},
  {id:"originaly",   g:"fakt",l:"originály",krok:1},
  {id:"fakturace",   g:"fakt",l:"fakturace",krok:1},
  {id:"vyfakturovano",g:"fakt",l:"vyfakturováno",krok:1}
];
var GROUPS=[["ident","Identifikace","g-ident"],["ozn","Oznámení","g-ozn"],["penize","Peníze","g-penize"],["proces","Proces ZBV","g-proces"],["fakt","Fakturace","g-fakt"]];
var COL_BY_ID={}; COLS.forEach(function(c){COL_BY_ID[c.id]=c;});
var KROK_IDS=COLS.filter(function(c){return c.krok;}).map(function(c){return c.id;});

// ╔══════════════════════ POMOCNÉ ══════════════════════╗
function $(id){return document.getElementById(id);}
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function isPlaceholder(){return !FIREBASE_CONFIG.apiKey||FIREBASE_CONFIG.apiKey.indexOf('PLACEHOLDER')!==-1;}
var DEMO_MODE=isPlaceholder()||/[?&]demo/.test(location.search);
function toNum(v){if(v===''||v==null)return null;if(typeof v==='number')return v;
  var s=String(v);if(!/^[-+]?[\d  ]+([.,]\d+)?$/.test(s))return null; // jen čistě číselný řetězec
  var n=parseFloat(s.replace(/[  ]/g,'').replace(',','.'));return isNaN(n)?null:n;}
function fmtNum(v){if(v===''||v==null)return '';var n=toNum(v);
  if(n==null)return esc(String(v)); // špinavý text (např. "1.060.346 Kč") ukaž tak, jak je
  return n.toLocaleString('cs-CZ',{maximumFractionDigits:0});}
function nowStr(){var d=new Date();function p(n){return (n<10?'0':'')+n;}return p(d.getDate())+'.'+p(d.getMonth()+1)+'.'+d.getFullYear()+' '+p(d.getHours())+':'+p(d.getMinutes());}
function tsStr(ts){if(!ts)return '';var d=new Date(ts);function p(n){return (n<10?'0':'')+n;}return p(d.getDate())+'.'+p(d.getMonth()+1)+'.'+d.getFullYear()+' '+p(d.getHours())+':'+p(d.getMinutes());}
// poznámka u ZBV = {text,ts}; toleruje starý formát (prostý string)
function poznGet(key){var v=DATA.poznamky[key];if(v&&typeof v==='object')return {text:v.text||'',ts:v.ts||0};return v?{text:String(v),ts:0}:{text:'',ts:0};}
function whoNow(){return (auth&&auth.currentUser&&auth.currentUser.email)?auth.currentUser.email:'';}
function getVal(z,id){if(!z)return '';if(KROK_IDS.indexOf(id)!==-1)return (z.kroky&&z.kroky[id]!=null)?z.kroky[id]:'';return (z[id]!=null)?z[id]:'';}
function setVal(z,id,v){if(KROK_IDS.indexOf(id)!==-1){z.kroky=z.kroky||{};if(v==='')delete z.kroky[id];else z.kroky[id]=v;}else{if(v==='')delete z[id];else z[id]=v;}}
function zbvKey(sid,zid){return sid+'__'+zid;}
function stavbaNm(s){return (s&&s.nazev)?s.nazev:'';}

// odvozený stav (když není ručně nastaven)
var VAZNE_DNI=14;  // ZBV bez pohybu déle než tolik dní = „bez progresu" (vázne)
// nejnovější datum napříč všemi kroky → kolik dní se nepohnulo (null = žádné datum)
function lastKrokDays(z){
  var newest=null;
  KROK_IDS.forEach(function(id){var v=getVal(z,id);if(!v)return;var ds=firstDate(v);if(!ds)return;
    var m=ds.match(/(\d{1,2})\.\s?(\d{1,2})\.\s?(\d{2,4})/);if(!m)return;var y=+m[3];if(y<100)y+=2000;
    var t=new Date(y,(+m[2])-1,+m[1]).getTime();if(newest==null||t>newest)newest=t;});
  if(newest==null)return null;
  return Math.floor((Date.now()-newest)/86400000);
}
function effStav(z){
  if(z.stav)return z.stav;
  if(getVal(z,'vyfakturovano')||getVal(z,'fakturace')||getVal(z,'iposEdok')||getVal(z,'zadanoIPOS'))return 'fakturovano';
  if(getVal(z,'podpisObjednatele')||getVal(z,'finalCistopis')||getVal(z,'pokynCistopis'))return 'hotovo'; // schváleno/podepsáno
  var dny=lastKrokDays(z);
  if(dny!=null&&dny>VAZNE_DNI)return 'bezprogresu';   // vázne — 14+ dní bez pohybu (i v rozdělané fázi)
  var procesData=KROK_IDS.some(function(id){return COL_BY_ID[id].g!=='ozn'&&getVal(z,id);});
  if(procesData)return 'vproces';   // v přípravě (čerstvě se hýbe)
  return 'evidovano';               // zatím jen zaevidováno / oznámeno, nezačato
}
var STAV_LBL={evidovano:'Evidováno',vproces:'V přípravě',bezprogresu:'Bez progresu',hotovo:'Hotovo',fakturovano:'Fakturováno'};

// ╔══════════════════════ STAV APLIKACE ══════════════════════╗
var DATA={meta:{},stavby:{},zbv:{},inbox:{},poznamky:{},dulezite:{},porady:{}};
var FILTER={q:'',stavba:'',stav:{},dulezite:false};   // stav = množina aktivních stavů ({} = vše)
var SB_SORT='poradi';   // řazení staveb v levém panelu
var SKRYT_VYRESENE=false;   // zápis z porad — skrýt vyřešené body
var VIEW='tabulka';
var STAVBA_INIT=false;
var EXPANDED={};   // rozbalené ZBV karty (klíč zbvKey)
var SHOW_ARCHIV=false;   // zobrazit i archivované stavby v panelu
var PHASE_LBL={ozn:'Oznámení',proces:'Proces ZBV',fakt:'Fakturace'};
var db=null,auth=null,started=false;

// ╔══════════════════════ RENDER TABULKY ══════════════════════╗
function cmpTxt(a,b){return String(a||'￿').localeCompare(String(b||'￿'),'cs',{numeric:true,sensitivity:'base'});}
// reprezentativní řešitel stavby = nejčastější řešitel napříč jejími ZBV
function stavbaResitel(sid){
  var m={},best='',bc=0,zm=(DATA.zbv&&DATA.zbv[sid])||{};
  Object.keys(zm).forEach(function(zid){var r=getVal(zm[zid],'resitel');if(!r)return;m[r]=(m[r]||0)+1;if(m[r]>bc){bc=m[r];best=r;}});
  return best;
}
function stavbyOrdered(){
  var arr=Object.keys(DATA.stavby).map(function(sid){var s=DATA.stavby[sid];return {sid:sid,s:s};});
  var L=function(o){return (o.s.lide)||{};};
  switch(SB_SORT){
    case 'cislo-asc':   arr.sort(function(a,b){return cmpTxt(a.s.cislo,b.s.cislo);}); break;
    case 'cislo-desc':  arr.sort(function(a,b){return cmpTxt(b.s.cislo,a.s.cislo);}); break;
    case 'nazev-asc':   arr.sort(function(a,b){return cmpTxt(a.s.nazev,b.s.nazev);}); break;
    case 'nazev-desc':  arr.sort(function(a,b){return cmpTxt(b.s.nazev,a.s.nazev);}); break;
    case 'resitel':     arr.sort(function(a,b){return cmpTxt(stavbaResitel(a.sid),stavbaResitel(b.sid));}); break;
    case 'pripravar':   arr.sort(function(a,b){return cmpTxt(L(a).pripravar,L(b).pripravar);}); break;
    case 'stavbyvedouci':arr.sort(function(a,b){return cmpTxt(L(a).stavbyvedouci,L(b).stavbyvedouci);}); break;
    default:            arr.sort(function(a,b){return (a.s.poradi||0)-(b.s.poradi||0);});
  }
  return arr;
}
function stavbyVisible(){return stavbyOrdered().filter(function(o){return SHOW_ARCHIV||!o.s.archiv;});}
function allDone(sid){var a=zbvOrdered(sid);if(!a.length)return false;return a.every(function(o){var s=effStav(o.z);return s==='hotovo'||s==='fakturovano';});}
function zbvOrdered(sid){
  var m=DATA.zbv[sid]||{};
  return Object.keys(m).map(function(zid){return {zid:zid,z:m[zid]};});
}
function activeCols(sid){
  var m=DATA.zbv[sid]||{};var has={};
  Object.keys(m).forEach(function(zid){var z=m[zid];COLS.forEach(function(c){if(getVal(z,c.id)!=='')has[c.id]=1;});});
  // vždy zobraz tyto, i prázdné:
  ['zbvCislo','nazev','popis','hodnotaZBV'].forEach(function(id){has[id]=1;});
  return COLS.filter(function(c){return has[c.id];});
}
function rowMatches(sid,zid,z){
  var st=effStav(z);
  var actSt=Object.keys(FILTER.stav);if(actSt.length&&!FILTER.stav[st])return false;
  if(FILTER.dulezite&&!DATA.dulezite[zbvKey(sid,zid)])return false;
  var q=FILTER.q.trim().toLowerCase();
  if(q){
    var hay=(stavbaNm(DATA.stavby[sid])+' '+getVal(z,'zbvCislo')+' '+getVal(z,'oznameniCislo')+' '+getVal(z,'SO')+' '+(z.nazev||'')+' '+(z.popis||'')+' '+getVal(z,'pricina')).toLowerCase();
    if(hay.indexOf(q)===-1)return false;
  }
  return true;
}
function sumStavba(sid){
  var p=0,n=0,h=0,cnt=0;
  zbvOrdered(sid).forEach(function(o){
    cnt++;var k=toNum(getVal(o.z,'zmenyKladne'));var z=toNum(getVal(o.z,'zmenyZaporne'));var hv=toNum(getVal(o.z,'hodnotaZBV'));
    if(k)p+=k; if(z)n+=z; if(hv)h+=hv;
  });
  return {p:p,n:n,h:h,cnt:cnt};
}
// počty ZBV po stavech (pro panel i hlavičku)
function statCounts(sid){
  var c={evidovano:0,bezprogresu:0,vproces:0,hotovo:0,fakturovano:0,total:0};
  zbvOrdered(sid).forEach(function(o){c.total++;var st=effStav(o.z);c[st]=(c[st]||0)+1;});
  return c;
}
// limity dle ZZVZ §222 (z ceny díla): sk.3+4 = 30 %, sk.5 = 15 %
function limity(s,sid){
  var cena=toNum(s.cenaDila),cer34=0,cer5=0;
  zbvOrdered(sid).forEach(function(o){var sk=String(getVal(o.z,'skupina'));var abs=Math.abs(toNum(getVal(o.z,'hodnotaZBV'))||0);
    if(/3|4/.test(sk))cer34+=abs; if(/5/.test(sk))cer5+=abs;});
  return {cena:cena,l34:cena!=null?cena*0.30:null,l5:cena!=null?cena*0.15:null,cer34:cer34,cer5:cer5};
}
// stadium = poslední vyplněný krok (v pořadí životního cyklu) = kde to teď je
function stadium(z){
  var done=null,idx=-1;
  KROK_IDS.forEach(function(id,i){if(getVal(z,id)){done=id;idx=i;}});
  var next=null;for(var k=idx+1;k<KROK_IDS.length;k++){if(!getVal(z,KROK_IDS[k])){next=KROK_IDS[k];break;}}
  return {done:done,doneLab:done?COL_BY_ID[done].l:'',doneVal:done?String(getVal(z,done)):'',nextLab:next?COL_BY_ID[next].l:''};
}
function firstDate(s){var m=String(s).match(/\d{1,2}\.\s?\d{1,2}\.\s?\d{2,4}/);return m?m[0]:'';}
// číslo ZBV: zobrazení 3místně (001, 017, 121) a číselné řazení
function zbvBadge(z){var v=String(getVal(z,'zbvCislo')||getVal(z,'oznameniCislo')||'');if(!v)return '—';return /^\d+$/.test(v)?(v.length>=3?v:('000'+v).slice(-3)):v;}
function zbvSort(z){var v=String(getVal(z,'zbvCislo')||getVal(z,'oznameniCislo')||'');var m=v.match(/\d+/);return m?parseInt(m[0],10):99999;}
// peníze po stavech v rámci jedné stavby
function statMoney(sid){var sm={evidovano:{n:0,h:0},vproces:{n:0,h:0},hotovo:{n:0,h:0},fakturovano:{n:0,h:0},bezprogresu:{n:0,h:0}};
  zbvOrdered(sid).forEach(function(o){var st=effStav(o.z),h=toNum(getVal(o.z,'hodnotaZBV'))||0;sm[st].n++;sm[st].h+=h;});return sm;}
function upd(){$('updated').textContent='M - SILNICE a.s. · OZ JIH a MOSTY – ZÁPAD · staveb: '+Object.keys(DATA.stavby).length+' · aktualizováno: '+(DATA.meta&&DATA.meta.updatedAt?DATA.meta.updatedAt:'—');}

function renderTabulka(){
  var _ord=stavbyOrdered();
  if(!STAVBA_INIT&&_ord.length){if(!FILTER.stavba)FILTER.stavba=_ord[0].sid;STAVBA_INIT=true;}
  buildStavbySide();
  var sid=FILTER.stavba,s=DATA.stavby[sid];
  if(!sid||!s){$('list').innerHTML='<div class="empty">Vyber stavbu v panelu vlevo.</div>';upd();return;}
  // hlavička stavby (lidé + limity)
  var ROLES=[['stavbyvedouci','SV'],['pripravar','PŘ'],['objednatel','OBJ'],['AD','AD'],['TDI','TDI'],['CM','CM']];
  var lideHtml=ROLES.map(function(p){return p[1]+': <b>'+esc((s.lide&&s.lide[p[0]])||'—')+'</b>';}).join(' · ');
  var L=limity(s,sid),sc=statCounts(sid),sm=statMoney(sid);
  var metr='<div class="smetrics">';
  metr+='<div class="smetric"><div class="l">Cena díla (vysoutěženo)</div><div class="v">'+(L.cena!=null?fmtNum(L.cena)+' Kč':'— zadej')+'</div></div>';
  if(L.l34!=null)metr+='<div class="smetric"><div class="l">Limit sk. 3+4 · 30 %</div><div class="v">'+fmtNum(L.l34)+' <span class="'+(L.cer34<=L.l34?'ok':'warn')+'">zbývá '+fmtNum(L.l34-L.cer34)+'</span></div></div>';
  if(L.l5!=null)metr+='<div class="smetric"><div class="l">Limit sk. 5 · 15 %</div><div class="v">'+fmtNum(L.l5)+' <span class="'+(L.cer5<=L.l5?'ok':'warn')+'">zbývá '+fmtNum(L.l5-L.cer5)+'</span></div></div>';
  metr+='<div class="smetric"><div class="l">ZBV celkem</div><div class="v">'+sc.total+'</div></div></div>';
  // součty po stavech v této stavbě (počet · peníze)
  var STS=[['evidovano','Evidováno'],['vproces','V přípravě'],['bezprogresu','Bez progresu (vázne)'],['hotovo','Hotovo'],['fakturovano','Fakturováno']];
  var smet2='<div class="smetrics">'+STS.map(function(p){return '<div class="smetric st-'+p[0]+'"><div class="l">'+p[1]+'</div><div class="v">'+sm[p[0]].n+' <span class="sub-h">'+fmtNum(sm[p[0]].h)+' Kč</span></div></div>';}).join('')+'</div>';
  var archBtn=s.archiv?'↩️ vrátit z archivu':(allDone(sid)?'📦 Uklidit do archivu (vše vyfakturováno)':'📦 Uklidit do archivu');
  var head='<div class="shead"><div style="display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap">'
    +'<div class="nazev">'+esc(s.nazev||sid)+(s.cislo?'<span class="cislo">č. '+esc(s.cislo)+'</span>':'')+'</div>'
    +'<button class="btn" data-eds="'+sid+'" style="margin-left:auto">✏️ upravit stavbu</button>'
    +'<button class="btn" data-arch="'+sid+'" title="Uklidit dokončenou stavbu (vše vyfakturováno) do archivu — zmizí z panelu vlevo, ale zůstane v Archivu i v Přehledu.">'+archBtn+'</button>'
    +'<button class="btn btn-add" data-add="'+sid+'">+ ZBV</button></div>'
    +(s.info?'<div class="lide">'+esc(s.info)+'</div>':'')
    +'<div class="lide">'+lideHtml+'</div>'+metr+smet2+'</div>';
  // ZBV karty
  var rows=zbvOrdered(sid).filter(function(r){return rowMatches(sid,r.zid,r.z);});
  rows.sort(function(a,b){return zbvSort(a.z)-zbvSort(b.z);});
  var cards=rows.map(function(r){return zbvCard(sid,r.zid,r.z);}).join('');
  $('list').innerHTML=head+(cards||'<div class="empty">Žádné ZBV odpovídající filtru.</div>');
  upd();
}
function zbvCard(sid,zid,z){
  var st=effStav(z),key=zbvKey(sid,zid),open=!!EXPANDED[key];
  var dul=!!DATA.dulezite[key];
  var num=zbvBadge(z);
  var sd=stadium(z);
  var amt='';var kl=fmtNum(getVal(z,'zmenyKladne')),zp=toNum(getVal(z,'zmenyZaporne'));
  if(kl)amt+='<span class="p">+'+kl+'</span> ';if(zp)amt+='<span class="n">−'+fmtNum(Math.abs(zp))+'</span>';
  var meta=[];if(getVal(z,'SO'))meta.push('SO '+getVal(z,'SO'));if(getVal(z,'resitel'))meta.push('řeší '+getVal(z,'resitel'));if(getVal(z,'skupina'))meta.push('sk. '+getVal(z,'skupina'));
  var dny=lastKrokDays(z);
  var vazne=(st==='bezprogresu'&&dny!=null)?'<span class="vazne-badge">⚠ vázne '+dny+' dní</span>':'';
  var stadHtml=(sd.done
    ?'<span class="stadchip">'+esc(sd.doneLab)+(firstDate(sd.doneVal)?' · '+firstDate(sd.doneVal):'')+'</span>'+(sd.nextLab?'<span class="zwait">další: '+esc(sd.nextLab)+'</span>':'')
    :'<span class="stadchip">zatím bez kroků — jen evidováno</span>')+vazne;
  var h='<div class="zcard st-'+st+(open?' open':'')+(dul?' dul':'')+'">'
    +'<div class="zhead" data-toggle="'+sid+'|'+zid+'">'
      +'<button class="pin'+(dul?' on':'')+'" data-star="'+key+'" title="důležité / sledovat">'+(dul?'⚑':'⚐')+'</button>'
      +'<span class="zbadge b-'+st+'">ZBV '+esc(num)+'</span>'
      +'<span class="znazev">'+esc(z.nazev||'(bez názvu)')+'</span>'
      +(meta.length?'<span class="zmeta">'+esc(meta.join(' · '))+'</span>':'')
      +'<span class="zchev">▸</span></div>'
    +'<div class="zstad">'+stadHtml+(amt?'<span class="zamt">'+amt+'</span>':'')+'</div>';
  if(open)h+=zbvDetail(sid,zid,z);
  return h+'</div>';
}
function zbvDetail(sid,zid,z){
  var key=zbvKey(sid,zid),pz=poznGet(key),note=pz.text,dul=!!DATA.dulezite[key];
  var h='<div class="zdetail">';
  var idf=[['popis',z.popis],['příčina změny',getVal(z,'pricina')],['SO / objekt',((getVal(z,'SO')||'')+' '+(getVal(z,'nazevSO')||'')).trim()],['skupina (§222)',getVal(z,'skupina')],
    ['změny kladné',fmtNum(getVal(z,'zmenyKladne'))],['změny záporné',fmtNum(getVal(z,'zmenyZaporne'))],['hodnota ZBV',fmtNum(getVal(z,'hodnotaZBV'))]];
  h+='<div class="zdrow">'+idf.map(function(p){return p[1]?'<div><span class="k">'+p[0]+'</span>'+esc(p[1])+'</div>':'';}).join('')+'</div>';
  if(getVal(z,'hodnotaZBV')||getVal(z,'zmenyKladne')||getVal(z,'zmenyZaporne'))h+='<div class="tl-empty" style="padding:0 0 4px">ℹ️ Částka je aktuální — platí hodnota z poslední fáze (čistopis / to, co jde na podpis); v čase se upřesňuje.</div>';
  h+='<div class="zpozn-wrap"><span class="k">📝 Obecná poznámka (kdokoliv napíše)'
    +(pz.ts?'<span class="zpozn-ts"> · zapsáno '+tsStr(pz.ts)+'</span>':'')+'</span>'
    +'<textarea class="zpozn" data-pozn="'+sid+'|'+zid+'" placeholder="Poznámka k tomuto ZBV — kontakty, dohody, na co pozor… (uloží se po kliknutí jinam)">'+esc(note)+'</textarea></div>';
  var sd=stadium(z);
  h+='<div class="tl-phase">Historie / kde to kdy bylo</div>';
  var tl='';
  GROUPS.forEach(function(G){if(G[0]==='ident'||G[0]==='penize')return;
    COLS.filter(function(c){return c.g===G[0]&&c.krok;}).forEach(function(c){var v=getVal(z,c.id);if(!v)return;
      tl+='<div class="tl-item'+(c.id===sd.done?' last':'')+'"><div class="tl-lab">'+esc(PHASE_LBL[G[0]]+' · '+c.l)+'</div><div class="tl-val">'+esc(v)+'</div></div>';});});
  h+=tl?'<div class="tl">'+tl+'</div>':'<div class="tl-empty">Zatím žádné kroky — doplní se z mailů, nebo dopiš přes „upravit".</div>';
  h+='<div class="zacts"><button class="btn" data-ed="'+sid+'|'+zid+'">✏️ upravit / doplnit</button>'
    +'<button class="btn" data-del="'+sid+'|'+zid+'" style="color:var(--neg)">✕ smazat</button></div>';
  return h+'</div>';
}
function buildStavbySide(){
  var el=$('stavby-side');if(!el)return;var html='';
  var SORTS=[['poradi','Řadit: výchozí'],['cislo-asc','Číslo ↑'],['cislo-desc','Číslo ↓'],['nazev-asc','Název A→Z'],['nazev-desc','Název Z→A'],['resitel','Řešitel ZBV'],['pripravar','Přípravář'],['stavbyvedouci','Stavbyvedoucí']];
  html+='<select id="sb-sort" class="sb-sort" title="Řazení staveb">'+SORTS.map(function(o){return '<option value="'+o[0]+'"'+(SB_SORT===o[0]?' selected':'')+'>'+o[1]+'</option>';}).join('')+'</select>';
  var archN=stavbyOrdered().filter(function(o){return o.s.archiv;}).length;
  stavbyVisible().forEach(function(o){
    var c=statCounts(o.sid),t=c.total||1;
    function seg(k){return c[k]?'<i class="seg-'+k+'" style="width:'+(c[k]/t*100)+'%"></i>':'';}
    var pr=o.s.lide&&o.s.lide.pripravar?o.s.lide.pripravar:'';
    html+='<div class="sb-item'+(FILTER.stavba===o.sid?' on':'')+(o.s.archiv?' arch':'')+'" data-side="'+o.sid+'">'
      +'<div class="nm">'+(o.s.archiv?'📦 ':'')+esc(o.s.nazev||o.sid)+'<span class="cnt">'+c.total+'</span></div>'
      +'<div class="sub">'+(o.s.cislo?'č. '+esc(o.s.cislo):'')+(o.s.cislo&&pr?' · ':'')+(pr?'PŘ '+esc(pr):'')+'</div>'
      +'<div class="sb-bar">'+seg('evidovano')+seg('vproces')+seg('bezprogresu')+seg('hotovo')+seg('fakturovano')+'</div></div>';
  });
  if(archN)html+='<div class="sb-arch-btn" id="sb-arch">'+(SHOW_ARCHIV?'▾ skrýt archiv':'📦 Archiv ('+archN+')')+'</div>';
  el.innerHTML=html;
}
// ╔══════════════════════ ZÁPIS Z PORAD (členěný po akcích) ══════════════════════╗
function dnesStr(){var d=new Date();function p(n){return (n<10?'0':'')+n;}return p(d.getDate())+'.'+p(d.getMonth()+1)+'.'+d.getFullYear();}
function poradyOrdered(){
  return Object.keys(DATA.porady||{}).map(function(pid){return {pid:pid,p:DATA.porady[pid]||{}};})
    .sort(function(a,b){return (b.p.ts||0)-(a.p.ts||0);});   // nejnovější nahoře
}
// vrátí sekce porady seřazené (akce = stavba/nadpis); toleruje i starý plochý formát (body bez sekcí)
function sekceOrdered(p){
  if(p.sekce)return Object.keys(p.sekce).map(function(skid){return {skid:skid,s:p.sekce[skid]||{}};})
    .sort(function(a,b){return (a.s.poradi||0)-(b.s.poradi||0)||(a.skid<b.skid?-1:1);});
  if(p.body)return [{skid:'_',s:{akce:'',body:p.body}}];   // legacy
  return [];
}
function bodyOrdered(s){var b=s.body||{};return Object.keys(b).sort().map(function(bid){return {bid:bid,b:b[bid]||{}};});}
function porOpenCount(p){var n=0;sekceOrdered(p).forEach(function(o){bodyOrdered(o.s).forEach(function(x){if(!x.b.done)n++;});});return n;}
function renderPorady(){
  var el=$('porady');if(!el)return;
  var list=poradyOrdered();
  var openTotal=0;list.forEach(function(o){openTotal+=porOpenCount(o.p);});
  var h='<div class="por-top"><div class="por-h">🗓️ Zápisy z porad ZBV'
    +'<span class="por-sub">'+list.length+' porad · '+openTotal+' otevřených bodů</span></div>'
    +'<div class="por-tools"><button class="btn" id="por-skryt">'+(SKRYT_VYRESENE?'☑ vyřešené skryté':'☐ skrýt vyřešené')+'</button>'
    +'<button class="btn" id="por-print">🖨️ Tisk</button>'
    +'<button class="btn btn-add" id="por-new">+ Nová porada</button></div></div>';
  if(!list.length){
    h+='<div class="por-empty">Zatím žádný zápis. Klikni <b>„+ Nová porada"</b> → přidej akci (stavbu) a piš pod ni body. Nejnovější porada je barevně, starší černě. Vyřešené body odškrtni „✓". Tlačítkem <b>„↧ Přenést nevyřešené"</b> stáhneš do nové porady všechno, co z minula zůstalo otevřené.</div>';
    el.innerHTML=h;return;
  }
  list.forEach(function(o,i){
    var p=o.p,isNew=(i===0),prev=list[i+1];
    h+='<div class="porada'+(isNew?' pnew':' pold')+'" data-por="'+o.pid+'">'
      +'<div class="por-head"><span class="por-dot"></span>'
      +'<input class="por-datum" data-pdat="'+o.pid+'" value="'+esc(p.datum||'')+'" title="datum porady">'
      +(isNew?'<span class="por-tag">nejnovější</span>':'')
      +'<span class="por-spc"></span>'
      +(prev?'<button class="por-carry" data-pcarry="'+o.pid+'" title="zkopíruje sem všechny neodškrtnuté body z porady '+esc(prev.p.datum||'')+'">↧ Přenést nevyřešené z '+esc(prev.p.datum||'minulé')+'</button>':'')
      +'<button class="por-x" data-pdel="'+o.pid+'" title="smazat celou poradu">✕ porada</button></div>';
    var seks=sekceOrdered(p),shownSek=0;
    seks.forEach(function(so){
      var bods=bodyOrdered(so.s),vis=bods.filter(function(x){return !(x.b.done&&SKRYT_VYRESENE);});
      if(SKRYT_VYRESENE&&!vis.length&&bods.length)return;   // celá sekce vyřešená a skrýváme
      shownSek++;
      h+='<div class="psek" data-skid="'+so.skid+'">'
        +'<div class="psek-head"><input class="psek-akce" data-pakce="'+o.pid+'|'+so.skid+'" value="'+esc(so.s.akce||'')+'" placeholder="Akce / stavba (např. Měšice)">'
        +'<button class="psek-x" data-pskdel="'+o.pid+'|'+so.skid+'" title="smazat akci">✕</button></div>';
      vis.forEach(function(x){
        h+='<div class="pbod'+(x.b.done?' done':'')+'">'
          +'<button class="pchk" data-ptog="'+o.pid+'|'+so.skid+'|'+x.bid+'" title="'+(x.b.done?'vrátit jako otevřené':'označit vyřešeno')+'">'+(x.b.done?'✓':'')+'</button>'
          +'<div class="ptxt" contenteditable="true" data-ptxt="'+o.pid+'|'+so.skid+'|'+x.bid+'" placeholder="napiš bod…">'+esc(x.b.text||'')+'</div>'
          +'<button class="pbx" data-pbdel="'+o.pid+'|'+so.skid+'|'+x.bid+'" title="smazat bod">✕</button></div>';
      });
      if(!vis.length)h+='<div class="por-none">— vše vyřešené —</div>';
      h+='<button class="pbod-add" data-padd="'+o.pid+'|'+so.skid+'">+ bod</button></div>';
    });
    if(!shownSek)h+='<div class="por-none" style="padding-left:2px">— žádné otevřené body —</div>';
    h+='<button class="psek-add" data-pseka="'+o.pid+'">+ přidat akci / stavbu</button></div>';
  });
  el.innerHTML=h;
}
function porFind(pid){return DATA.porady[pid];}
function porMaxPoradi(p){var m=0;sekceOrdered(p).forEach(function(o){if((o.s.poradi||0)>m)m=o.s.poradi||0;});return m;}
function porNewSekceObj(akce,poradi){return {akce:akce||'',poradi:poradi,body:{}};}
function porNew(){
  var pid='p'+Date.now();
  DATA.porady[pid]={datum:dnesStr(),ts:Date.now(),sekce:{}};
  var skid='s'+Date.now();
  DATA.porady[pid].sekce[skid]=porNewSekceObj('',1);
  var bid='b'+Date.now();DATA.porady[pid].sekce[skid].body[bid]={text:'',done:false};
  if(db)db.ref('/porady/'+pid).set(DATA.porady[pid]);
  renderPorady();
  var t=document.querySelector('[data-pakce="'+pid+'|'+skid+'"]');if(t)t.focus();
}
function porAddSekce(pid){var p=porFind(pid);if(!p)return;p.sekce=p.sekce||{};
  var skid='s'+Date.now();p.sekce[skid]=porNewSekceObj('',porMaxPoradi(p)+1);
  var bid='b'+Date.now();p.sekce[skid].body[bid]={text:'',done:false};
  if(db)db.ref('/porady/'+pid+'/sekce/'+skid).set(p.sekce[skid]);
  renderPorady();
  var t=document.querySelector('[data-pakce="'+pid+'|'+skid+'"]');if(t)t.focus();
}
function porAddBod(pid,skid){var p=porFind(pid);if(!p||!p.sekce||!p.sekce[skid])return;p.sekce[skid].body=p.sekce[skid].body||{};
  var bid='b'+Date.now();p.sekce[skid].body[bid]={text:'',done:false};
  if(db)db.ref('/porady/'+pid+'/sekce/'+skid+'/body/'+bid).set(p.sekce[skid].body[bid]);
  renderPorady();
  var t=document.querySelector('[data-ptxt="'+pid+'|'+skid+'|'+bid+'"]');if(t)t.focus();
}
function porToggle(pid,skid,bid){var p=porFind(pid);if(!p||!p.sekce||!p.sekce[skid]||!p.sekce[skid].body[bid])return;
  var b=p.sekce[skid].body[bid];b.done=!b.done;
  if(db)db.ref('/porady/'+pid+'/sekce/'+skid+'/body/'+bid+'/done').set(b.done?true:null);
  renderPorady();
}
function porDelBod(pid,skid,bid){var p=porFind(pid);if(!p||!p.sekce||!p.sekce[skid])return;
  delete p.sekce[skid].body[bid];
  if(db)db.ref('/porady/'+pid+'/sekce/'+skid+'/body/'+bid).remove();
  renderPorady();
}
function porDelSekce(pid,skid){var p=porFind(pid);if(!p||!p.sekce||!p.sekce[skid])return;
  var has=Object.keys(p.sekce[skid].body||{}).length;
  if(has&&!confirm('Smazat akci „'+(p.sekce[skid].akce||'(bez názvu)')+'" i s body?'))return;
  delete p.sekce[skid];
  if(db)db.ref('/porady/'+pid+'/sekce/'+skid).remove();
  renderPorady();
}
function porDel(pid){if(!confirm('Smazat celou poradu i se všemi akcemi a body?'))return;
  delete DATA.porady[pid];
  if(db)db.ref('/porady/'+pid).remove();
  renderPorady();
}
function porSaveText(pid,skid,bid,txt){var p=porFind(pid);if(!p||!p.sekce||!p.sekce[skid]||!p.sekce[skid].body[bid])return;
  if(p.sekce[skid].body[bid].text===txt)return;
  p.sekce[skid].body[bid].text=txt;
  if(db)db.ref('/porady/'+pid+'/sekce/'+skid+'/body/'+bid+'/text').set(txt);
}
function porSaveAkce(pid,skid,txt){var p=porFind(pid);if(!p||!p.sekce||!p.sekce[skid]||p.sekce[skid].akce===txt)return;
  p.sekce[skid].akce=txt;
  if(db)db.ref('/porady/'+pid+'/sekce/'+skid+'/akce').set(txt);
}

// přenést z PŘEDCHOZÍ porady všechny NEvyřešené body (zachová členění po akcích)
function porCarry(pid){
  var p=porFind(pid);if(!p)return;
  var list=poradyOrdered(),idx=-1;list.forEach(function(o,i){if(o.pid===pid)idx=i;});
  var prev=list[idx+1];if(!prev){alert('Žádná starší porada k přenosu.');return;}
  var moved=0,base=Date.now();p.sekce=p.sekce||{};
  sekceOrdered(prev.p).forEach(function(so){
    var open=bodyOrdered(so.s).filter(function(x){return !x.b.done;});
    if(!open.length)return;
    var skid='s'+(base++);var sek=porNewSekceObj(so.s.akce||'',porMaxPoradi(p)+1);
    open.forEach(function(x){var bid='b'+(base++);sek.body[bid]={text:x.b.text||'',done:false};moved++;});
    p.sekce[skid]=sek;
    if(db)db.ref('/porady/'+pid+'/sekce/'+skid).set(sek);
  });
  renderPorady();
  if(!moved)alert('Z porady '+(prev.p.datum||'')+' nezbyly žádné nevyřešené body.');
}

// ředitelský přehled — součty ZBV a peněz přes VŠECHNY stavby po stavech
function renderPrehled(){
  var STATES=[['evidovano','Evidováno'],['vproces','V přípravě (rozpracováno)'],['bezprogresu','Bez progresu (vázne)'],['hotovo','Hotovo (schváleno)'],['fakturovano','Fakturováno']];
  var agg={};STATES.forEach(function(s){agg[s[0]]={n:0,h:0};});
  var arch={n:0,h:0,stavby:0};   // archiv (dokončené) — počítá se ZVLÁŠŤ, ne do aktivních
  var per=[];
  stavbyOrdered().forEach(function(o){
    var row={sid:o.sid,nazev:o.s.nazev||o.sid,cislo:o.s.cislo||'',archiv:!!o.s.archiv,st:{evidovano:{n:0,h:0},bezprogresu:{n:0,h:0},vproces:{n:0,h:0},hotovo:{n:0,h:0},fakturovano:{n:0,h:0}},total:0,suma:0};
    zbvOrdered(o.sid).forEach(function(r){var stt=effStav(r.z),h=toNum(getVal(r.z,'hodnotaZBV'))||0;
      row.st[stt].n++;row.st[stt].h+=h;row.total++;row.suma+=h;
      if(o.s.archiv){arch.n++;arch.h+=h;}else{agg[stt].n++;agg[stt].h+=h;}});
    if(o.s.archiv&&row.total)arch.stavby++;
    per.push(row);
  });
  var totN=0,totH=0;STATES.forEach(function(s){totN+=agg[s[0]].n;totH+=agg[s[0]].h;});
  var nActive=Object.keys(DATA.stavby).filter(function(sid){return !DATA.stavby[sid].archiv;}).length;
  var html='<div class="ph-head">Ředitelský přehled — aktivní stavby ('+nActive+')</div><div class="ph-cards">';
  STATES.forEach(function(s){html+='<div class="ph-card st-'+s[0]+'"><div class="phc-l">'+s[1]+'</div><div class="phc-n">'+agg[s[0]].n+' ZBV</div><div class="phc-h">'+fmtNum(agg[s[0]].h)+' Kč</div></div>';});
  html+='<div class="ph-card ph-tot"><div class="phc-l">Celkem (aktivní)</div><div class="phc-n">'+totN+' ZBV</div><div class="phc-h">'+fmtNum(totH)+' Kč</div></div></div>';
  if(arch.stavby)html+='<div class="ph-cards"><div class="ph-card ph-arch"><div class="phc-l">📦 Archiv — dokončené (počítá se zvlášť)</div><div class="phc-n">'+arch.stavby+' staveb · '+arch.n+' ZBV</div><div class="phc-h">'+fmtNum(arch.h)+' Kč</div></div></div>';
  html+='<div class="ph-head">Po stavbách (klik = otevřít stavbu)</div><div class="ph-tbl-wrap"><table class="ph-tbl"><thead><tr><th>Stavba</th><th>ZBV</th><th>V přípravě</th><th>Vázne</th><th>Hotovo</th><th>Fakturováno</th><th>Hodnota celkem</th></tr></thead><tbody>';
  function cell(r,k,cls){return '<td class="cena '+cls+'">'+(r.st[k].n?r.st[k].n+' · '+fmtNum(r.st[k].h):'—')+'</td>';}
  function rowHtml(r){return '<tr class="ph-row" data-side="'+r.sid+'"><td class="ph-nm">'+(r.archiv?'📦 ':'')+esc(r.nazev)+(r.cislo?' <span class="zmeta">č. '+esc(r.cislo)+'</span>':'')+'</td>'
      +'<td class="c">'+r.total+'</td>'+cell(r,'vproces','vp')+cell(r,'bezprogresu','bp')+cell(r,'hotovo','ho')+cell(r,'fakturovano','fa')+'<td class="cena"><b>'+fmtNum(r.suma)+'</b></td></tr>';}
  var active=per.filter(function(r){return !r.archiv&&r.total;}).sort(function(a,b){return b.suma-a.suma;});
  var arr=per.filter(function(r){return r.archiv&&r.total;}).sort(function(a,b){return b.suma-a.suma;});
  active.forEach(function(r){html+=rowHtml(r);});
  if(arr.length){html+='<tr class="ph-sep"><td colspan="7">📦 Archiv — dokončené stavby (mimo součty nahoře)</td></tr>';arr.forEach(function(r){html+=rowHtml(r);});}
  html+='</tbody></table></div>';
  $('prehled').innerHTML=html;upd();
}

function applyNavrh(nv){
  // vrací {sid,zid} cíle; zapíše do DATA.zbv + Firebase
  var sid=nv.stavbaId;if(!sid||sid==='?')return null;
  DATA.zbv[sid]=DATA.zbv[sid]||{};
  var zid=nv.zbvId;
  if(!zid||zid==='new'){
    zid='z'+Date.now();
    var z={stav:''};
    if(nv.zbvCislo)z.zbvCislo=nv.zbvCislo;
    if(nv.oznameniCislo)z.oznameniCislo=nv.oznameniCislo;
    if(nv.SO)z.SO=nv.SO;
    if(nv.nazev)z.nazev=nv.nazev;
    if(nv.popis)z.popis=nv.popis;
    DATA.zbv[sid][zid]=z;
  }
  var z=DATA.zbv[sid][zid]||{};DATA.zbv[sid][zid]=z;
  if(nv.krok&&nv.hodnota)setVal(z,nv.krok,nv.hodnota);
  // částky
  ['zmenyZaporne','zmenyKladne','hodnotaZBV','skupina'].forEach(function(f){if(nv[f]!=null&&nv[f]!=='')z[f]=nv[f];});
  if(db)db.ref('/zbv/'+sid+'/'+zid).set(z);
  return {sid:sid,zid:zid};
}

  i.stav='zahozeno';if(db)db.ref('/inbox/'+id+'/stav').set('zahozeno');

// ╔══════════════════════ EXPORT CSV ══════════════════════╗
function exportCSV(){
  var rows=[];var hdr=['Stavba','stav'].concat(COLS.map(function(c){return c.l;}));rows.push(hdr);
  stavbyOrdered().forEach(function(o){var sid=o.sid;if(FILTER.stavba&&FILTER.stavba!==sid)return;
    zbvOrdered(sid).forEach(function(r){if(!rowMatches(sid,r.zid,r.z))return;
      var line=[stavbaNm(o.s),STAV_LBL[effStav(r.z)]];
      COLS.forEach(function(c){line.push(String(getVal(r.z,c.id)).replace(/\n/g,' '));});
      rows.push(line);
    });
  });
  var csv='﻿'+rows.map(function(r){return r.map(function(c){return '"'+String(c==null?'':c).replace(/"/g,'""')+'"';}).join(';');}).join('\n');
  var a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='ZBV_export_'+nowStr().replace(/[ :.]/g,'-')+'.csv';a.click();
}
